名称: 使用 Conda 的 Python 软件包

on: [push]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      最大并行数: 5

    步骤:
    - 使用: actions/checkout@v4
    - 名称: 配置 Python 3.10
      使用: actions/setup-python@v3
      with:
        Python 版本: '3.10'

      run: |
        # $CONDA 是一个指向 Miniconda 目录根路径的环境变量
        将 $CONDA/bin 添加到 $GITHUB_PATH
    - 名称: 安装依赖
      run: |
        conda env update --file environment.yml --name base
    - name: 使用 flake8 进行 lint 检查
      run: |
        使用 conda 安装 flake8
        # 如果存在 Python 语法错误或未定义的名称，则停止构建
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero 将所有错误视为警告。GitHub 编辑器的宽度为 127 个字符
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    - 名称: 使用 pytest 进行测试
      run: |
        使用 conda 安装 pytest
        pytest
