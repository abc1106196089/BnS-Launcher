名称: 构建 Windows EXE
on: [push]
jobs:
  build:
运行环境: windows-latest
    步骤:
      - 使用: actions/checkout@v4
      - 用途: actions/setup-python@v5
        with:
          python-version: '3.11'
      - 运行: pip install pyinstaller requests pymssql mysql-connector-python psycopg2-binary
      - 运行: pyinstaller --onefile --windowed --uac-admin --name "剑灵2.0图形界面启动器" bns_launcher.py
      - 用途: actions/upload-artifact@v4
        with:
          名称: BnS-Launcher-EXE
          path: dist/

          